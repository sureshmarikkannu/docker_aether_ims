######################################################################
# Terminating, Initial requests
######################################################################
route[MT] {
    xnotice("PCSCF MT: \n Destination URI: $du\n Request URI: $ru\n");
    xnotice("Source IP and Port: ($si:$sp)\n Route-URI: $route_uri\n");
    xnotice("Received IP and Port: ($Ri:$Rp)\n");
    xnotice("Contact header: $ct\n");
    set_dlg_profile("term");
#!ifdef WITH_IPSEC
    ipsec_forward("pcscf_location");
#!endif
        t_on_reply("MT_reply");
}

######################################################################
# Replies to Originating Initial Requests
######################################################################
onreply_route[MT_reply] {
    xnotice("PCSCF MT_reply: \n Destination URI: $du\n Request URI: $ru\n");
    xnotice("Source IP and Port: ($si:$sp)\n Route-URI: $route_uri\n");
    xnotice("Received IP and Port: ($Ri:$Rp)\n");
    xnotice("Contact header: $ct\n");
        if (!strempty($(ct{tobody.params}))) {
                append_hf("C-Params: $(ct{tobody.params})\r\n");
        }

        # In case of 1xx and 2xx do NAT
        if(status=~"[12][0-9][0-9]")
                route(NATMANAGE);

#!ifdef WITH_N5
if (t_check_status("180|183|200") && has_body("application/sdp")) {
        xlog("Entered in Got 183/180 From terminating Users PDU Creation");
        $var(ueIp) = "";
        $var(ueAudioPort) = "";
        $var(ueVideoPort) = "";
        $var(ueMsisdn) = "";
        $var(ueRtcpPort) = "";
        $var(callType) = "";
        if (sdp_with_media("video")) {
                $var(callType) = "VIDEO";
                if (sdp_get_line_startswith("$avp(mline)", "m=audio")) {
                        xlog("m-line: $avp(mline)\n");
                        $var(ueIp) = $si;
                        $var(ueAudioPort) = $(avp(mline){s.select,1, });
                        $var(ueMsisdn) = $tU;
                        xlog("L_INFO", "SDP Originating UE IP is $var(ueIp) and Audio Port is $var(ueAudioPort)\n and UE MSISDN is $var(ueMsisdn) and RTCP Port is $var(ueRtcpPort) for Call Type : $var(callType)");
                }
                if (sdp_get_line_startswith("$avp(mline)", "m=video")) {
                        xlog("m-line: $avp(mline)\n");
                        $var(ueIp) = $si;
                        $var(ueVideoPort) = $(avp(mline){s.select,1, });
                        $var(ueMsisdn) = $tU;
                        xlog("L_INFO", "SDP Originating UE IP is $var(ueIp) and Video Port is $var(ueVideoPort)\n and UE MSISDN is $var(ueMsisdn) for Call Type : $var(callType)");
                }
        } else if (sdp_with_media("audio")) {
                $var(callType) = "AUDIO";
                xlog("Entered for to Users in Audio Call Session");
                if (sdp_get_line_startswith("$avp(mline)", "m=audio")) {
                        xlog("m-line: $avp(mline)\n");
                        $var(ueIp) = $si;
                        $var(ueAudioPort) = $(avp(mline){s.select,1, });
                        $var(ueMsisdn) = $tU;
                        xlog("L_INFO", "SDP Originating UE IP is $var(ueIp) and Audio Port is $var(ueAudioPort)\n and UE MSISDN is $var(ueMsisdn) and RTCP Port is $var(ueRtcpPort) for Call Type : $var(callType)");
                }
        } else {
                xlog("L_ERR", "SDP does not contain audio or video m-line\n");
                send_reply("400", "Bad Request - SDP does not contain audio or video m-line");
        }
        if ($var(callType) == "AUDIO") {
                xlog("L_INFO","Call type Found $var(callType)");
                $var(body) = "{\"fromUEIP\":\"" + $var(ueIp) + "\","
                + "\"fromUEAUDIOPORT\":\"" + $var(ueAudioPort) + "\","
                + "\"fromUEMSISDN\":\"" + $var(ueMsisdn) + "\"}";
                xlog("L_INFO","updatePDUSession-Audio (body:$var(body))");
                $var(res) = http_connect("apiserver","/createPDUAudio","application/json", $var(body), "$avp(route)");
                xlog("L_INFO", "API-server HTTP updatePDUSession-Audio Response: $avp(route), Result code: $var(res)");
        } else if ($var(callType) == "VIDEO") {
                xlog("L_INFO","Call type Found $var(callType)");
                $var(body) = "{\"fromUEIP\":\"" + $var(ueIp) + "\","
                + "\"fromUEAUDIOPORT\":\"" + $var(ueAudioPort) + "\","
                + "\"fromUEVIDEOPORT\":\"" + $var(ueVideoPort) + "\","
                + "\"fromUEMSISDN\":\"" + $var(ueMsisdn) + "\"}";
                xlog("L_INFO","updatePDUSession-Video (body:$var(body))");
                $var(res) = http_connect("apiserver","/createPDUVideo","application/json", $var(body), "$avp(route)");
                xlog("L_INFO", "API-server HTTP updatePDUSession-Video Response: $avp(route), Result code: $var(res)");
        } else {
                xlog("L_INFO","No Call type Found");
        }


}
if (status=~"[45][0-9][0-9]") {
        xnotice("Received Error response for the Call. Going to terminate N5 Session\n");
        route(N5_MTC_TERM);
}
#!endif
#!ifdef WITH_RX
        if (t_check_status("183|200") && has_body("application/sdp")){
        xnotice("PCSCF MT_reply: \n Destination URI: $du\n Request URI: $ru\n");
        xnotice("Source IP and Port: ($si:$sp)\n Route-URI: $route_uri\n");
        xnotice("Received IP and Port: ($Ri:$Rp)\n");
        xnotice("Contact header: $ct\n");
                xlog("L_DBG", "IMS: Received 183 inside term_initial_reply\n");

                xlog("L_DBG", "About to test if this is a retransmitted reply which is still currently suspended\n");
                if (t_is_retr_async_reply()) {
                        xlog("L_DBG", "Dropping retransmitted reply which is still currently suspended\n");
                         drop();
                }

                xlog("L_DBG","Diameter: Term authorizing media via Rx\n");
                $avp(FTAG_CUSTOM_AVP)=$ft;
                $avp(TTAG_CUSTOM_AVP)=$tt;
                $avp(CALLID_CUSTOM_AVP)=$ci;

        if (Rx_AAR("MT_aar_reply","term","",-1) == 0) {
            exit;
        }
        }
}

route[MT_aar_reply]
{
        xlog("L_DBG", "IMS: TERM_SESSION_AAR_REPLY\n");

        #this is async so to know status we have to check the reply avp
        switch ($avp(s:aar_return_code)) {
                case 1:
                        xlog("L_DBG", "Diameter: Orig AAR success on media authorization\n");
                        break;
                default:
                        xlog("L_ERR", "IMS: AAR failed Orig\n");
                        xlog("L_ERR", "IMS: ttag: "+ "$avp(TTAG_CUSTOM_AVP)");
                        xlog("L_ERR", "IMS: ftag: "+ "$avp(FTAG_CUSTOM_AVP)");
                        xlog("L_ERR", "IMS: callid: "+ "$avp(CALLID_CUSTOM_AVP)");
                        #comment this if you want to allow even if Rx fails
                        if(dlg_get("$avp(CALLID_CUSTOM_AVP)","$avp(FTAG_CUSTOM_AVP)","$avp(TTAG_CUSTOM_AVP)")){
                                dlg_terminate("all", "Sorry no QoS available");
                                exit;
                        }
        }
#!endif
}


######################################################################
# In-Dialog-MT-Requests
######################################################################
route[MT_indialog] {
#!ifdef WITH_N5
        if (is_method("INVITE")) {
                xlog("L_INFO"," InDialog SDP Change. Sending N5 Request to update appSession context\n");
        //      route(N5_PATCH_REQ);
        }
        if (is_method("BYE|CANCEL")) {
                xlog("L_INFO"," InDialog Call End/Cancel/Error. Terminating N5 QoS Session\n");
                route(N5_MTC_TERM);
        }
#!endif
    xnotice("PCSCF MT_indialog: \n Destination URI: $du\n Request URI: $ru\n");
    xnotice("Source IP and Port: ($si:$sp)\n Route-URI: $route_uri\n");
    xnotice("Received IP and Port: ($Ri:$Rp)\n");
    xnotice("Contact header: $ct\n");
    #resetflag(FLT_MOBILE_ORIG);
        t_on_reply("MT_indialog_reply");

    # Append rport only if its a request coming from UE
        if (is_request() && ($hdrc(Via) == 1)) {
                force_rport();
        }

#!ifdef WITH_IPSEC
    if ($dd != "" && $rd != "" && $fs != "") {
        if ($rd =~ ".*" + $dd + ".*") {
            ipsec_forward("pcscf_location");
        }
    }
#!endif
}

onreply_route[MT_indialog_reply] {
    xnotice("PCSCF MT_indialog_reply: \n Destination URI: $du\n Request URI: $ru\n");
    xnotice("Source IP and Port: ($si:$sp)\n Route-URI: $route_uri\n");
    xnotice("Received IP and Port: ($Ri:$Rp)\n");
    xnotice("Contact header: $ct\n");
        # In case of 1xx and 2xx do NAT
        if(status=~"[12][0-9][0-9]")
                route(NATMANAGE);

#!ifdef WITH_RX
        if (t_check_status("183|200") && has_body("application/sdp")) {
                if (t_is_retr_async_reply()) {
                        xlog("L_DBG", "Dropping retransmitted reply which is still currently suspended\n");
                        drop();
                }

                xlog("L_DBG", "IMS: TERM_SUBSEQUENT reply. This is a 200 OK to a re-INVITE\n");
                xlog("L_DBG","Diameter: Term authorizing media via Rx\n");
                $avp(FTAG_CUSTOM_AVP)=$ft;
                $avp(TTAG_CUSTOM_AVP)=$tt;
                $avp(CALLID_CUSTOM_AVP)=$ci;

                if (Rx_AAR("MT_indialog_aar_reply","term","",-1) == 0) {
            exit;
        }
        }
}

route[MT_indialog_aar_reply]
{
        #this is async so to know status we have to check the reply avp
        switch ($avp(s:aar_return_code)) {
                case 1:
                        xlog("L_DBG", "Diameter: Orig AAR success on media authorization\n");
                        break;
                default:
                        xlog("L_ERR", "IMS: AAR failed Orig\n");
                        xlog("L_ERR", "IMS: ttag: "+ "$avp(TTAG_CUSTOM_AVP)");
                        xlog("L_ERR", "IMS: ftag: "+ "$avp(FTAG_CUSTOM_AVP)");
                        xlog("L_ERR", "IMS: callid: "+ "$avp(CALLID_CUSTOM_AVP)");
                        #comment this if you want to allow even if Rx fails
                        if(dlg_get("$avp(CALLID_CUSTOM_AVP)","$avp(FTAG_CUSTOM_AVP)","$avp(TTAG_CUSTOM_AVP)")){
                                dlg_terminate("all", "Sorry no QoS available");
                                exit;
                        }
        }
#!endif
}
#!ifdef WITH_N5
route[N5_MTC_TERM] {
        $var(ueMsisdn) = $tU;
        $var(body) = "{\"fromUEMSISDN\":\"" + $var(ueMsisdn) + "\"}";
        xlog("L_INFO","updatePDUSession-Delet (body:$var(body))");
        $var(res) = http_connect("apiserver","/deletePDU","application/json", $var(body), "$avp(route)");
        xlog("L_INFO", "API-server HTTP updatePDUSession-Delet Response: $avp(route), Result code: $var(res)");
}
#!endif
